<section id="projects" class="section" aria-labelledby="projects-title">
  <div class="container">
    <app-section-heading
      eyebrow="Projects"
      title="Things I've"
      accent="built"
      titleId="projects-title"
      subtitle="A selection of projects that showcase my engineering across the stack."
    />

    <div class="projects__grid">
      @for (project of projects; track project.name; let i = $index) {
        <article
          class="projects__card gradient-border reveal"
          appReveal
          [revealDelay]="(i % 3) * 100"
        >
          <div class="projects__media">
            <img
              [src]="project.image"
              [alt]="project.name + ' preview'"
              loading="lazy"
              decoding="async"
              width="480"
              height="270"
            />
            <div class="projects__overlay" aria-hidden="true"></div>
          </div>

          <div class="projects__body">
            <h3 class="projects__name">{{ project.name }}</h3>
            <p class="projects__desc">{{ project.description }}</p>

            <ul class="projects__stack">
              @for (tech of project.stack; track tech) {
                <li class="chip">{{ tech }}</li>
              }
            </ul>

            <div class="projects__actions">
              @if (project.github) {
                <a
                  class="btn btn--ghost projects__btn"
                  [href]="project.github"
                  target="_blank"
                  rel="noopener noreferrer"
                  [attr.aria-label]="'View ' + project.name + ' on GitHub'"
                >
                  <app-icon class="btn__icon" name="github" [size]="18" />
                  Code
                </a>
              }

              @if (project.demo) {
                <a
                  class="btn btn--ghost projects__btn"
                  [href]="project.demo"
                  target="_blank"
                  rel="noopener noreferrer"
                  [attr.aria-label]="'Open live demo of ' + project.name"
                >
                  <app-icon class="btn__icon" name="external" [size]="18" />
                  Live
                </a>
              }
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
