<section id="skills" class="section skills" aria-labelledby="skills-title">
  <div class="container">
    <app-section-heading eyebrow="Skills" title="My technical" accent="toolbox" titleId="skills-title"
      subtitle="Technologies and practices I use to design, build and ship reliable software." />

    <div class="skills__grid">
      @for (category of categories; track category.title; let i = $index) {
      <article class="skills__card gradient-border reveal" appReveal [revealDelay]="(i % 4) * 90">
        <div class="skills__card-inner">
          <header class="skills__card-head">
            <span class="skills__icon">
              <app-icon [name]="iconFor(category.icon)" [size]="20" />
            </span>
            <div class="skills__card-meta">
              <h3 class="skills__card-title"> {{ category.title }} </h3>
              <span class="skills_card-count"> {{ category.skills.length }} technologies</span>
            </div>
          </header>

          <ul class="skills__list" [attr.aria-label]="category.title + 'skills'">
            @for (skill of category.skills; track skill.name) {
            <li class="skills__chip" [class.skills__chip--accent]="skill.level >= 85">
              {{skill.name}}
            </li>
            }
          </ul>
        </div>
      </article>
      }
    </div>
  </div>
</section>
